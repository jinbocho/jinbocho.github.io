site_name: Jinbocho Documentation
site_description: Home Library Management System - Complete Documentation
site_url: https://jinbocho.github.io/manuals/
repo_url: https://github.com/jinbocho/
repo_name: jinbocho
docs_dir: docs
site_dir: site/manuals

theme:
  name: material
  logo: assets/jinbocho-logo.svg
  favicon: assets/jinbocho-logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow

nav:
  - Home: https://jinbocho.github.io/
  - Why Jinbocho:
      - Self-hosted Goodreads alternative: compare/goodreads-self-hosted-alternative.md
      - Catalog your home library: compare/catalog-your-home-library.md
      - Track which shelf a book is on: compare/track-which-shelf-a-book-is-on.md
  - Developer Manual:
      - Overview: developer/index.md
      - Prerequisites: developer/01-prerequisites.md
      - Local Development: developer/02-local-development.md
      - Backend Services: developer/03-backend-services.md
      - Frontend: developer/04-frontend.md
      - Database & Migrations: developer/05-database-migrations.md
      - CI/CD: developer/06-cicd.md
      - Production Deployment: developer/07-production-deployment.md
      - Monitoring & Logging: developer/08-monitoring-logging.md
      - Troubleshooting: developer/09-troubleshooting.md
      - Architecture: developer/10-architecture.md
  - User Manual:
      - Overview: user/index.md
      - Getting Started: user/01-getting-started.md
      - Authentication: user/02-authentication.md
      - Managing Your Library: user/03-managing-library.md
      - Locations: user/04-locations.md
      - Book Details: user/05-book-details.md
      - Book Presentation: user/15-book-presentation.md
      - Search & Filters: user/06-search-filters.md
      - ISBN Scanning: user/07-isbn-scanning.md
      - Export & Import: user/08-export-import.md
      - User Management: user/09-user-management.md
      - Reading Progress: user/10-reading-progress.md
      - Mobile Experience: user/11-mobile.md
      - Language & Localization: user/12-localization.md
      - FAQ: user/13-faq.md
      - Troubleshooting: user/14-troubleshooting.md

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

extra:
  homepage: https://jinbocho.github.io/
  alternate:
    - name: English
      link: /manuals/
      lang: en
    - name: Italiano
      link: /manuals/it/
      lang: it
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jinbocho
      name: GitHub Organization

extra_css:
  - assets/custom.css

