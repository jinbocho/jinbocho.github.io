site_name: Jinbocho Documentation
site_description: Home Library Management System - Complete Documentation
site_url: https://jinbocho.github.io/manuals/
repo_url: https://github.com/jinbocho/
repo_name: jinbocho
docs_dir: docs
site_dir: site/manuals

theme:
  name: material
  logo: assets/jinbocho-logo.svg
  favicon: assets/jinbocho-logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

nav:
  - Home: https://jinbocho.github.io/
  - Why Jinbocho:
      - Self-hosted Goodreads alternative: compare/goodreads-self-hosted-alternative.md
      - Catalog your home library: compare/catalog-your-home-library.md
      - Track which shelf a book is on: compare/track-which-shelf-a-book-is-on.md
      - Jinbocho vs Libib vs Skoolib: compare/jinbocho-vs-libib-vs-skoolib.md
      - The philosophy behind Kids Mode: philosophy/kids-mode.md
  - Developer Manual:
      - Overview: developer/index.md
      - Prerequisites: developer/01-prerequisites.md
      - Local Development: developer/02-local-development.md
      - Backend Services: developer/03-backend-services.md
      - Frontend: developer/04-frontend.md
      - Database & Migrations: developer/05-database-migrations.md
      - CI/CD: developer/06-cicd.md
      - Production Deployment: developer/07-production-deployment.md
      - Monitoring & Logging: developer/08-monitoring-logging.md
      - Troubleshooting: developer/09-troubleshooting.md
      - Architecture: developer/10-architecture.md
  - User Manual:
      - Overview: user/index.md
      - Getting Started: user/01-getting-started.md
      - Authentication: user/02-authentication.md
      - Managing Your Library: user/03-managing-library.md
      - Locations: user/04-locations.md
      - Book Details: user/05-book-details.md
      - Book Presentation: user/15-book-presentation.md
      - Search & Filters: user/06-search-filters.md
      - ISBN Scanning: user/07-isbn-scanning.md
      - Export & Import: user/08-export-import.md
      - User Management: user/09-user-management.md
      - Reading Progress: user/10-reading-progress.md
      - Loans: user/16-loans.md
      - Wishlist: user/17-wishlist.md
      - Book Club: user/19-book-club.md
      - Kids Mode: user/18-kids-mode.md
      - Mobile Experience: user/11-mobile.md
      - Language & Appearance: user/12-localization.md
      - FAQ: user/13-faq.md
      - Troubleshooting: user/14-troubleshooting.md
  - Managed Installation: managed-install.md

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

extra:
  analytics:
    provider: google
    property: G-TF0Z5E1TLK
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us
      make our documentation better.
    actions:
      - accept
      - reject
      - manage
  homepage: https://jinbocho.github.io/
  alternate:
    - name: English
      link: /manuals/
      lang: en
    - name: Italiano
      link: /manuals/it/
      lang: it
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jinbocho
      name: GitHub Organization
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/jinbocho.app
      name: Instagram

extra_css:
  - assets/custom.css

copyright: Copyright &copy; 2026 Carmelo La Gamba. All rights reserved. | Proprietary – Community Use Allowed
